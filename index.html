<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>loading · code vibe</title>
  <!-- Font Awesome for icons (optional but adds flavour) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace;
    }

    body {
      background: #0b0e14;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1rem;
    }

    /* main loading card – soft glassmorphism + neon glow */
    .loader-wrapper {
      background: rgba(18, 25, 35, 0.65);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 210, 255, 0.15);
      border-radius: 3.5rem;
      padding: 3.5rem 4rem;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 25px 45px -10px rgba(0, 20, 40, 0.8), 
                  0 0 0 1px rgba(0, 180, 255, 0.1) inset,
                  0 0 30px rgba(0, 180, 255, 0.2);
      transition: all 0.2s ease;
      text-align: center;
    }

    /* terminal header – just for that dev vibe */
    .terminal-bar {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      margin-bottom: 2.2rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(100, 210, 255, 0.1);
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot-red { background: #ff5f6d; box-shadow: 0 0 8px #ff5f6d88; }
    .dot-yellow { background: #ffc107; box-shadow: 0 0 8px #ffc10788; }
    .dot-green { background: #2ecc71; box-shadow: 0 0 8px #2ecc7188; }

    .terminal-path {
      margin-left: 0.75rem;
      color: #8ba4c7;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
      opacity: 0.7;
      font-weight: 300;
    }
    .terminal-path i {
      margin-right: 6px;
      color: #5fc3ff;
    }

    /* main heading – code crush */
    .code-crush {
      font-size: 2.2rem;
      font-weight: 500;
      background: linear-gradient(145deg, #b7e4ff, #7ec8ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 18px rgba(70, 180, 255, 0.3);
    }

    .sub-line {
      color: #7f9bb3;
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 2.8rem;
      border-bottom: 1px dashed rgba(100, 210, 255, 0.1);
      padding-bottom: 1.2rem;
    }
    .sub-line i {
      margin: 0 6px;
      color: #64d2ff;
    }

    /* the loader itself – 100% custom */
    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.8rem;
    }

    /* animated code brackets – the vibe */
    .brackets {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      font-size: 4.2rem;
      font-weight: 300;
      color: #b0d4f0;
      letter-spacing: 6px;
      position: relative;
    }

    .bracket {
      display: inline-block;
      animation: pulseBracket 1.8s infinite ease-in-out;
      opacity: 0.7;
      text-shadow: 0 0 20px #4ab3ff66;
    }
    .bracket.left { animation-delay: 0s; }
    .bracket.right { animation-delay: 0.3s; }

    .bracket-center {
      font-size: 2.2rem;
      color: #50b8ff;
      animation: glitchPulse 1.4s infinite alternate;
      margin: 0 8px;
      text-shadow: 0 0 25px #3a9eff;
    }

    @keyframes pulseBracket {
      0% { opacity: 0.3; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1.1); text-shadow: 0 0 30px #7ac7ff; }
      100% { opacity: 0.3; transform: scale(0.95); }
    }

    @keyframes glitchPulse {
      0% { opacity: 0.5; transform: rotate(0deg) scale(1); }
      100% { opacity: 1; transform: rotate(2deg) scale(1.08); color: #8ad0ff; }
    }

    /* progress bar – clean and neon */
    .progress-track {
      width: 100%;
      max-width: 320px;
      height: 8px;
      background: #1f2a38;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 0 12px rgba(0, 140, 255, 0.2) inset;
      margin: 0.5rem 0 0.3rem;
      border: 1px solid #2a3a4e;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #3aa8ff, #b0e0ff, #6fc3ff);
      background-size: 200% 100%;
      border-radius: 40px;
      box-shadow: 0 0 18px #3f9eff, 0 0 8px #7fc9ff;
      animation: shimmer 1.8s infinite linear;
      transition: width 0.25s ease;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* percentage + status text */
    .status-line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      width: 100%;
      max-width: 320px;
      color: #a1bedb;
      font-size: 0.9rem;
      letter-spacing: 0.8px;
      margin-top: 2px;
    }

    .percent {
      font-weight: 500;
      font-size: 1.2rem;
      background: linear-gradient(135deg, #b3dbff, #7ec8ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .status-text {
      font-weight: 300;
      font-size: 0.9rem;
      background: #1c2a3a;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      border: 1px solid #2f435a;
      box-shadow: 0 0 12px #1f3b4f33;
      backdrop-filter: blur(4px);
    }
    .status-text i {
      margin-right: 8px;
      color: #6fc8ff;
      font-size: 0.8rem;
    }

    /* little terminal cursor */
    .cursor-blink {
      display: inline-block;
      width: 10px;
      height: 1.2rem;
      background: #7fc8ff;
      margin-left: 6px;
      animation: blink 1s step-end infinite;
      vertical-align: middle;
      border-radius: 2px;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* girl code vibe – heart + subtle */
    .code-heart {
      margin-top: 2.2rem;
      font-size: 0.9rem;
      color: #5e7f9e;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border-top: 1px solid rgba(100, 210, 255, 0.08);
      padding-top: 1.6rem;
    }
    .code-heart i {
      color: #ff6b8a;
      font-size: 1.2rem;
      animation: heartBeat 1.6s infinite;
    }
    @keyframes heartBeat {
      0% { transform: scale(1); }
      15% { transform: scale(1.25); text-shadow: 0 0 20px #ff6b8a; }
      30% { transform: scale(1); }
      45% { transform: scale(1.15); }
      60% { transform: scale(1); }
    }

    /* responsive */
    @media (max-width: 480px) {
      .loader-wrapper { padding: 2.5rem 1.8rem; border-radius: 2.5rem; }
      .code-crush { font-size: 1.8rem; }
      .brackets { font-size: 3.2rem; }
      .bracket-center { font-size: 1.8rem; }
      .terminal-path { font-size: 0.7rem; }
    }
  </style>
</head>
<body>
  <div class="loader-wrapper" role="status" aria-live="polite">
    <!-- terminal bar with dots -->
    <div class="terminal-bar">
      <span class="dot dot-red"></span>
      <span class="dot dot-yellow"></span>
      <span class="dot dot-green"></span>
      <span class="terminal-path"><i class="fas fa-folder-open"></i> ~/dev/loading </span>
    </div>

    <!-- header -->
    <div class="code-crush">
      <i class="fas fa-code" style="margin-right: 10px; opacity: 0.7;"></i> 
      code<span style="color:#9bc9ff;">·</span>vibe
    </div>
    <div class="sub-line">
      <i class="fas fa-terminal"></i> 
      <span id="statusMessage">initializing environment</span>
      <i class="fas fa-cog fa-spin" style="opacity:0.6;"></i>
    </div>

    <!-- loader -->
    <div class="loader-container">
      <!-- brackets animation -->
      <div class="brackets">
        <span class="bracket left">{</span>
        <span class="bracket-center"> &lt;/&gt; </span>
        <span class="bracket right">}</span>
      </div>

      <!-- progress bar -->
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
      </div>

      <!-- status + percent -->
      <div class="status-line">
        <span class="percent" id="percentDisplay">0%</span>
        <span class="status-text" id="statusTag">
          <i class="fas fa-sync-alt fa-fw fa-spin"></i> loading
        </span>
      </div>
    </div>

    <!-- cute heart + girl code signature -->
    <div class="code-heart">
      <span>// RE-IMAGINIG THE FUTURE</span>
     
      <span>✨</span>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // DOM elements
      const progressFill = document.getElementById('progressFill');
      const percentDisplay = document.getElementById('percentDisplay');
      const statusTag = document.getElementById('statusTag');
      const statusMessage = document.getElementById('statusMessage');

      // cool status messages (coding flavour)
      const statusMessages = [
        'fetching dependencies',
        'compiling kernels',
        'warming up cache',
        'linking libraries',
        'optimizing for love',
        'building assets',
        'spinning up containers',
        'checking type safety',
        'reticulating splines',
        'finalizing bundle'
      ];

      let progress = 0;
      let interval = null;
      let step = 0;

      // function to update UI
      function updateLoader(value) {
        const clamped = Math.min(100, Math.max(0, value));
        progressFill.style.width = clamped + '%';
        percentDisplay.textContent = Math.floor(clamped) + '%';

        // change status text based on progress
        const index = Math.min(Math.floor(clamped / 10), statusMessages.length - 1);
        const msg = statusMessages[index] || 'almost ready';
        statusMessage.textContent = msg;

        // update small status tag with an icon
        if (clamped < 30) {
          statusTag.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> loading`;
        } else if (clamped < 70) {
          statusTag.innerHTML = `<i class="fas fa-code fa-fw"></i> coding`;
        } else if (clamped < 95) {
          statusTag.innerHTML = `<i class="fas fa-rocket fa-fw"></i> launching`;
        } else {
          statusTag.innerHTML = `<i class="fas fa-check-circle" style="color:#5fc8ff;"></i> ready`;
        }

        // little extra: when near 100, show heart
        if (clamped >= 98) {
          statusTag.innerHTML = `<i class="fas fa-heart" style="color:#ff6b8a;"></i> deployed with <3`;
        }
      }

      // start loading simulation
      function startLoading() {
        if (interval) clearInterval(interval);

        interval = setInterval(() => {
          // random increment between 0.6 and 2.8 (feels organic)
          const increment = 0.8 + Math.random() * 2.0;
          let newProgress = progress + increment;

          // if we reach >= 100, complete and redirect
          if (newProgress >= 100) {
            newProgress = 100;
            updateLoader(100);
            clearInterval(interval);
            interval = null;

            // final message
            statusMessage.textContent = '✨ ready to dash ✨';
            statusTag.innerHTML = `<i class="fas fa-heart" style="color:#ff6b8a;"></i> 100%`;

            // REDIRECT to dash.html after a short pause (1.2s)
            setTimeout(() => {
              window.location.href = 'dash.html';
            }, 1200);

            return;
          }

          progress = newProgress;
          updateLoader(progress);
        }, 180); // smooth update every 180ms
      }

      // ---- initialise ----
      // set starting state
      progress = 0;
      updateLoader(0);
      statusMessage.textContent = 'booting up ...';

      // start the loading sequence after a tiny delay (so everything renders)
      setTimeout(() => {
        startLoading();
      }, 300);

      // in case someone wants to restart (not needed, but clean)
      window.addEventListener('beforeunload', function() {
        if (interval) clearInterval(interval);
      });

      // if the user navigates away, clear interval (good practice)
    })();
  </script>
</body>
</html>
